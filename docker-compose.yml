# =============================================================================
# Smart Trade Africa — Local Development Docker Compose
# Usage: docker-compose up (uses .env file for secrets)
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sta
      POSTGRES_USER: sta_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sta_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sta_app -d sta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sta_app:${POSTGRES_PASSWORD:-sta_dev_password}@db:5432/sta
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-sta-dev-secret-change-in-production}
      DEBUG: "true"
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/code/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
